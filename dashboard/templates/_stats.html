<div class="stats shadow bg-base-100 w-full">
  <div class="stat">
    <div class="stat-title">Total Papers</div>
    <div class="stat-value">{{ stats.total }}</div>
  </div>
  <div class="stat">
    <div class="stat-title">Tags</div>
    <div class="stat-value text-lg">{{ stats.tags | length }}</div>
  </div>
</div>

{% if stats.tags %}
<div class="flex flex-wrap gap-2 mt-4">
  {% for tag, count in stats.tags %}
  <div class="badge badge-outline badge-lg gap-1">{{ tag }}<span class="text-xs opacity-60">{{ count }}</span></div>
  {% endfor %}
</div>
{% endif %}
