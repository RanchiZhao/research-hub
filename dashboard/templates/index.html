<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="min-h-screen bg-base-200">

  <div class="navbar bg-base-100 shadow-lg">
    <a href="./" class="btn btn-ghost text-xl">Research Hub</a>
  </div>

  <div class="container mx-auto px-4 py-8 max-w-6xl">

    <!-- Stats -->
    <div id="stats-section" hx-get="frag/stats" hx-trigger="load" hx-swap="innerHTML">
      {% include '_stats.html' %}
    </div>

    <!-- Paper List -->
    <h2 class="text-2xl font-bold mt-8 mb-4">Papers</h2>
    <div id="paper-list" hx-get="frag/papers" hx-trigger="load" hx-swap="innerHTML">
      {% include '_paper_list.html' %}
    </div>

  </div>

</body>
</html>
